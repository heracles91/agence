<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c9a84c"/>
      <stop offset="70%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Gold accent line -->
  <rect x="0" y="0" width="4" height="630" fill="#c9a84c" opacity="0.6"/>

  <!-- Corner brackets -->
  <path d="M80,80 L80,56 L56,56" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1120,80 L1120,56 L1144,56" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M80,550 L80,574 L56,574" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1120,550 L1120,574 L1144,574" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- PHASE 0 badge -->
  <rect x="80" y="140" width="90" height="26" fill="none" stroke="#3f3f46" stroke-width="1"/>
  <text x="125" y="158" font-family="'Space Grotesk', monospace" font-size="11" font-weight="700" fill="#71717a" text-anchor="middle" letter-spacing="3">PHASE 0</text>

  <!-- Main title -->
  <text x="80" y="280" font-family="'Space Grotesk', Georgia, serif" font-size="130" font-weight="700" fill="#ffffff" letter-spacing="-4">AGENCE</text>

  <!-- Subtitle line -->
  <rect x="80" y="310" width="600" height="1" fill="url(#line)"/>

  <!-- Description -->
  <text x="80" y="360" font-family="'Inter', sans-serif" font-size="24" fill="#a1a1aa" letter-spacing="1">30 jours · 9 rôles · Un seul client à satisfaire</text>

  <!-- CTA -->
  <text x="80" y="430" font-family="'Space Grotesk', monospace" font-size="14" font-weight="600" fill="#c9a84c" letter-spacing="4">SAUREZ-VOUS GARDER L'AGENCE À FLOT ?</text>

  <!-- Domain -->
  <text x="1120" y="574" font-family="'Space Grotesk', monospace" font-size="13" fill="#52525b" text-anchor="end" letter-spacing="2">agence.kameni.fr</text>

  <!-- Decorative dots -->
  <circle cx="1100" cy="140" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="1120" cy="140" r="2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="1140" cy="140" r="2" fill="#c9a84c" opacity="0.4"/>
</svg>
